document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

   padding: 64px 72px 72px;\n    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 30px 60px -30px rgba(0,0,0,0.18);\n    border-radius: 2px;\n  }\n\n  /* ---------- Header ---------- */\n  .masthead {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    border-bottom: 1px solid var(--ink);\n    padding-bottom: 18px;\n    margin-bottom: 36px;\n  }\n  .masthead .eyebrow {\n    text-transform: uppercase;\n    letter-spacing: 0.22em;\n    font-size: 11px;\n    color: var(--ink-soft);\n    margin-bottom: 10px;\n  }\n  .masthead h1 {\n    font-family: var(--font-display);\n    font-weight: 400;\n    font-size: 44px;\n    line-height: 1.0;\n    margin: 0;\n    letter-spacing: -0.015em;\n    color: var(--accent-deep);\n  }\n  .masthead h1 em {\n    font-style: italic;\n    font-weight: 400;\n  }\n  .masthead h1 strong {\n    font-weight: 400;\n  }\n  .masthead .meta {\n    text-align: right;\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: var(--ink-soft);\n    line-height: 1.7;\n  }\n\n  /* ---------- Intro ---------- */\n  .intro {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 40px;\n    margin-bottom: 48px;\n    padding-bottom: 36px;\n    border-bottom: 1px dashed var(--rule);\n  }\n  .intro p {\n    margin: 0;\n    font-size: 15px;\n    color: var(--ink-soft);\n    text-wrap: pretty;\n  }\n  .intro .lede {\n    font-size: 18px;\n    line-height: 1.45;\n    color: var(--ink);\n    font-weight: 400;\n  }\n\n  /* ---------- Steps ---------- */\n  .steps {\n    display: flex;\n    flex-direction: column;\n    gap: 36px;\n  }\n  .step {\n    display: grid;\n    grid-template-columns: 56px 1fr 280px;\n    gap: 28px;\n    align-items: start;\n  }\n  .step .num {\n    font-family: var(--font-display);\n    font-size: 48px;\n    font-weight: 400;\n    line-height: 1;\n    color: var(--accent);\n    letter-spacing: -0.02em;\n    border-top: 1px solid var(--accent);\n    padding-top: 14px;\n  }\n  .step .body {\n    padding-top: 14px;\n    border-top: 1px solid var(--rule);\n  }\n  .step h2 {\n    font-family: var(--font-display);\n    font-size: 22px;\n    font-weight: 400;\n    margin: 0 0 10px;\n    letter-spacing: -0.005em;\n    color: var(--ink);\n    line-height: 1.2;\n  }\n  .step .body p {\n    margin: 0;\n    color: var(--ink-soft);\n    font-size: 14px;\n    text-wrap: pretty;\n  }\n  .step .tag-row {\n    margin-top: 14px;\n    display: flex;\n    flex-wrap: wrap;\n    gap: 6px;\n  }\n  .tag {\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    background: var(--tag-bg);\n    border: 1px solid var(--rule);\n    color: var(--ink);\n    font-size: 11px;\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n    padding: 5px 9px;\n    border-radius: 999px;\n  }\n  .tag .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--accent);\n  }\n  .tag {\n    color: var(--accent-deep);\n    border-color: #d6e0ee;\n  }\n\n  /* ---------- Image slots ---------- */\n  .slot {\n    aspect-ratio: 1 / 1;\n    border: 1px solid var(--rule);\n    background: #ffffff;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin: 0;\n    position: relative;\n    overflow: hidden;\n  }\n  .slot img {\n    width: 100%;\n    height: 100%;\n    object-fit: contain;\n    display: block;\n  }\n  .slot .annot {\n    position: absolute;\n    pointer-events: none;\n    overflow: visible;\n  }\n  .slot .annot path {\n    fill: none;\n    stroke: #C9A24A;          /* gold */\n    stroke-width: 3.5px;\n    stroke-linecap: round;\n    stroke-linejoin: round;\n    vector-effect: non-scaling-stroke;\n  }\n  .slot figcaption {\n    position: absolute;\n    left: 10px;\n    bottom: 10px;\n    background: rgba(255,255,255,0.92);\n    border: 1px solid var(--rule);\n    padding: 4px 8px;\n    font-family: \"DM Sans\", sans-serif;\n    font-size: 10px;\n    color: var(--accent-deep);\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    font-weight: 500;\n  }\n\n  /* ---------- Footer ---------- */\n  .foot {\n    margin-top: 56px;\n    padding-top: 22px;\n    border-top: 1px solid var(--ink);\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    gap: 24px;\n  }\n  .foot .note {\n    font-size: 12.5px;\n    color: var(--ink-soft);\n    max-width: 60%;\n    text-wrap: pretty;\n  }\n  .foot .note strong {\n    color: var(--ink);\n    font-weight: 600;\n  }\n  .foot .ref {\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.22em;\n    color: var(--ink-soft);\n    text-align: right;\n    line-height: 1.8;\n  }\n\n  /* ---------- Diagram callout ---------- */\n  .legend {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 14px;\n    margin: 8px 0 44px;\n    padding: 18px 20px;\n    background: #f3efe4;\n    border: 1px solid var(--rule);\n  }\n  .legend .item {\n    display: flex;\n    flex-direction: column;\n    gap: 4px;\n  }\n  .legend .item .k {\n    font-size: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.18em;\n    color: var(--ink-soft);\n  }\n  .legend .item .v {\n    font-size: 13px;\n    color: var(--ink);\n    font-weight: 500;\n  }\n\n  @media (max-width: 720px) {\n    .page { padding: 36px 28px 48px; }\n    .masthead h1 { font-size: 28px; }\n    .intro { grid-template-columns: 1fr; gap: 18px; }\n    .step { grid-template-columns: 40px 1fr; }\n    .step .slot { grid-column: 1 / -1; }\n    .legend { grid-template-columns: 1fr 1fr; }\n    .foot { flex-direction: column; align-items: flex-start; }\n    .foot .note, .foot .ref { max-width: 100%; text-align: left; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n  <main class=\"page\">\n\n    <header class=\"masthead\">\n      <div>\n        <h1>Using your Thermostat<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"meta\">HYATT.COM\nNEWARK DELAWARE<\u002Fdiv>\n    <\u002Fheader>\n\n    <section class=\"intro\">\n      <p class=\"lede\">\n        Set your room to the temperature you prefer in just a few taps. The\n        wall-mounted thermostat controls both heating and cooling.\n      <\u002Fp>\n      <p>\n        If the display appears blank, it has simply gone to sleep to save\n        energy — a single tap will bring it back. The four steps on this card\n        cover everything you need to know.\n      <\u002Fp>\n    <\u002Fsection>\n\n    <div class=\"legend\" aria-label=\"Control reference\">\n      <div class=\"item\"><span class=\"k\">Power<\u002Fspan><span class=\"v\">Lower-right button<\u002Fspan><\u002Fdiv>\n      <div class=\"item\"><span class=\"k\">Wake<\u002Fspan><span class=\"v\">Center \"OK\" key<\u002Fspan><\u002Fdiv>\n      <div class=\"item\"><span class=\"k\">Adjust<\u002Fspan><span class=\"v\">Up / Down arrows<\u002Fspan><\u002Fdiv>\n      <div class=\"item\"><span class=\"k\">Menus<\u002Fspan><span class=\"v\">Left / Right zones<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <section class=\"steps\">\n\n      <article class=\"step\">\n        <div class=\"num\">01<\u002Fdiv>\n        <div class=\"body\">\n          <h2>Make sure it's powered on.<\u002Fh2>\n          <p>Make sure the power button on the front of the thermostat is glowing. If it is dark, tap the power button once and watch for the light to come on.<\u002Fp>\n          <div class=\"tag-row\">\n            <span class=\"tag\"><span class=\"dot\"><\u002Fspan>Power button lit<\u002Fspan>\n            <span class=\"tag\">Single tap if dark<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <figure class=\"slot\" data-annots=\"circle\">\n          <img src=\"f40c7557-2209-47ec-a1e3-74bdc37ba172\" alt=\"Thermostat — power button state\">\n        <\u002Ffigure>\n      <\u002Farticle>\n\n      <article class=\"step\">\n        <div class=\"num\">02<\u002Fdiv>\n        <div class=\"body\">\n          <h2>Wake the screen with the \"OK\" key.<\u002Fh2>\n          <p>\n            The display dims after a short period of inactivity. Tap the\n            <strong>OK<\u002Fstrong> button in the center of the keypad once. The\n            screen will brighten and show the current room temperature and the\n            set point.\n          <\u002Fp>\n          <div class=\"tag-row\">\n            <span class=\"tag\">Tap once<\u002Fspan>\n            <span class=\"tag\">Center key<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <figure class=\"slot\" data-annots=\"c2\">\n          <img src=\"f40c7557-2209-47ec-a1e3-74bdc37ba172\" alt=\"Thermostat — OK key wakes screen\">\n        <\u002Ffigure>\n      <\u002Farticle>\n\n      <article class=\"step\">\n        <div class=\"num\">03<\u002Fdiv>\n        <div class=\"body\">\n          <h2>Set your temperature with ▲ and ▼.<\u002Fh2>\n          <p>\n            Use the <strong>up arrow<\u002Fstrong> to raise the target temperature\n            and the <strong>down arrow<\u002Fstrong> to lower it. Each press changes\n            the set point by one degree. The room will adjust automatically.\n          <\u002Fp>\n          <div class=\"tag-row\">\n            <span class=\"tag\">▲ warmer<\u002Fspan>\n            <span class=\"tag\">▼ cooler<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <figure class=\"slot\" data-annots=\"c3a c3b\">\n          <img src=\"f40c7557-2209-47ec-a1e3-74bdc37ba172\" alt=\"Thermostat — up and down arrows\">\n        <\u002Ffigure>\n      <\u002Farticle>\n\n      <article class=\"step\">\n        <div class=\"num\">04<\u002Fdiv>\n        <div class=\"body\">\n          <h2>Switch menus with the left and right zones.<\u002Fh2>\n          <p>Tap the left or right side of the screen to move between menus — for fan speed and mode (heat / cool / auto)<\u002Fp>\n          <div class=\"tag-row\">\n            <span class=\"tag\">◀ previous menu<\u002Fspan>\n            <span class=\"tag\">next menu ▶<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <figure class=\"slot\" data-annots=\"c4a c4b\">\n          <img src=\"f40c7557-2209-47ec-a1e3-74bdc37ba172\" alt=\"Thermostat — left and right zones\">\n        <\u002Ffigure>\n      <\u002Farticle>\n\n    <\u002Fsection>\n\n    <footer class=\"foot\">\n      <div class=\"note\">\n        <strong>Need a hand?<\u002Fstrong> Dial 0 from your room phone and a member\n        of our team will be happy to assist with temperature, ventilation, or\n        any other in-room comfort settings.\n      <\u002Fdiv>\n      <div class=\"ref\">\n        Card&nbsp;TH-01<br>\n        Rev.&nbsp;05·2026\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fmain>\n\n  <!-- ============ Tweaks panel ============ -->\n  <div id=\"tweaks-panel\" hidden=\"\">\n    <header>\n      <span>Tweaks<\u002Fspan>\n      <button type=\"button\" id=\"tweaks-close\" aria-label=\"Close\">×<\u002Fbutton>\n    <\u002Fheader>\n    <div class=\"tw-scroll\" id=\"tweaks-body\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <style>\n    #tweaks-panel {\n      position: fixed;\n      bottom: 20px;\n      right: 20px;\n      width: 290px;\n      max-height: calc(100vh - 40px);\n      display: flex;\n      flex-direction: column;\n      background: #ffffff;\n      border: 1px solid var(--rule);\n      border-radius: 4px;\n      box-shadow: 0 12px 32px -10px rgba(0,0,0,0.25);\n      font-family: var(--font-sans);\n      font-size: 12px;\n      color: var(--ink);\n      z-index: 1000;\n    }\n    #tweaks-panel[hidden] { display: none; }\n    #tweaks-panel .tw-scroll {\n      overflow-y: auto;\n      padding-bottom: 12px;\n      flex: 1 1 auto;\n    }\n    #tweaks-panel header {\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      padding: 10px 14px;\n      border-bottom: 1px solid var(--rule);\n      background: var(--accent-deep);\n      color: #fff;\n      border-radius: 4px 4px 0 0;\n      font-weight: 600;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      font-size: 11px;\n    }\n    #tweaks-panel header button {\n      background: transparent;\n      border: 0;\n      color: #fff;\n      font-size: 18px;\n      line-height: 1;\n      cursor: pointer;\n      padding: 0 4px;\n    }\n    #tweaks-panel .tw-section {\n      padding: 12px 14px 4px;\n      font-size: 10px;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--ink-soft);\n    }\n    #tweaks-panel .tw-row {\n      display: grid;\n      grid-template-columns: 70px 1fr 44px;\n      gap: 8px;\n      align-items: center;\n      padding: 4px 14px;\n    }\n    #tweaks-panel .tw-k {\n      font-size: 12px;\n      color: var(--ink);\n    }\n    #tweaks-panel .tw-v {\n      font-size: 11px;\n      color: var(--ink-soft);\n      font-variant-numeric: tabular-nums;\n      text-align: right;\n    }\n    #tweaks-panel input[type=\"range\"] {\n      width: 100%;\n      accent-color: var(--accent);\n    }\n    #tweaks-panel input[type=\"color\"] {\n      width: 100%;\n      height: 22px;\n      border: 1px solid var(--rule);\n      border-radius: 3px;\n      background: transparent;\n      cursor: pointer;\n      padding: 0;\n    }\n  <\u002Fstyle>\n\n  <script>\n    (function () {\n      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n        \"circleX\": 68.5,\n        \"circleY\": 69,\n        \"circleSize\": 15.5,\n        \"c2X\": 43,\n        \"c2Y\": 69,\n        \"c2S\": 15,\n        \"c3aX\": 44.5,\n        \"c3aY\": 60,\n        \"c3aS\": 12,\n        \"c3bX\": 44.5,\n        \"c3bY\": 82,\n        \"c3bS\": 12,\n        \"c4aX\": 33,\n        \"c4aY\": 70.5,\n        \"c4aS\": 13,\n        \"c4bX\": 55,\n        \"c4bY\": 70.5,\n        \"c4bS\": 13,\n        \"circleColor\": \"#c9be4a\",\n        \"circleStroke\": 4.3\n      }/*EDITMODE-END*/;\n\n      // One descriptor per highlight circle, in render order.\n      // keys = [xKey, yKey, sizeKey] in TWEAK_DEFAULTS.\n      const CIRCLES = [\n        { id: 'circle', label: 'Step 1 · Power button',  keys: ['circleX','circleY','circleSize'] },\n        { id: 'c2',     label: 'Step 2 · OK key',         keys: ['c2X','c2Y','c2S']               },\n        { id: 'c3a',    label: 'Step 3 · ▲ Up arrow',     keys: ['c3aX','c3aY','c3aS']            },\n        { id: 'c3b',    label: 'Step 3 · ▼ Down arrow',   keys: ['c3bX','c3bY','c3bS']            },\n        { id: 'c4a',    label: 'Step 4 · ◀ Left zone',    keys: ['c4aX','c4aY','c4aS']            },\n        { id: 'c4b',    label: 'Step 4 · Right zone ▶',   keys: ['c4bX','c4bY','c4bS']            }\n      ];\n\n      const SCALLOP_PATH =\n        'M 21.00 12.00 ' +\n        'A 2.8 2.8 0 0 1 19.79 16.50 ' +\n        'A 2.8 2.8 0 0 1 16.50 19.79 ' +\n        'A 2.8 2.8 0 0 1 12.00 21.00 ' +\n        'A 2.8 2.8 0 0 1 7.50 19.79 ' +\n        'A 2.8 2.8 0 0 1 4.21 16.50 ' +\n        'A 2.8 2.8 0 0 1 3.00 12.00 ' +\n        'A 2.8 2.8 0 0 1 4.21 7.50 ' +\n        'A 2.8 2.8 0 0 1 7.50 4.21 ' +\n        'A 2.8 2.8 0 0 1 12.00 3.00 ' +\n        'A 2.8 2.8 0 0 1 16.50 4.21 ' +\n        'A 2.8 2.8 0 0 1 19.79 7.50 ' +\n        'A 2.8 2.8 0 0 1 21.00 12.00 Z';\n\n      const SVG_NS = 'http://www.w3.org/2000/svg';\n\n      const tweaks  = Object.assign({}, TWEAK_DEFAULTS);\n      const panel   = document.getElementById('tweaks-panel');\n      const closeB  = document.getElementById('tweaks-close');\n      const body    = document.getElementById('tweaks-body');\n\n      // ---------- Inject SVG circles into every figure[data-annots] ----------\n      const slotEls = {}; // id -> { svg, path }\n      document.querySelectorAll('.slot[data-annots]').forEach(fig => {\n        fig.dataset.annots.split(/\\s+/).filter(Boolean).forEach(cid => {\n          const svg  = document.createElementNS(SVG_NS, 'svg');\n          svg.setAttribute('class', 'annot');\n          svg.setAttribute('id', 'annot-' + cid);\n          svg.setAttribute('viewBox', '0 0 24 24');\n          svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');\n          svg.setAttribute('aria-hidden', 'true');\n          const p = document.createElementNS(SVG_NS, 'path');\n          p.setAttribute('d', SCALLOP_PATH);\n          svg.appendChild(p);\n          fig.appendChild(svg);\n          slotEls[cid] = { svg, path: p };\n        });\n      });\n\n      // ---------- Build tweaks panel UI ----------\n      function row(label, k, type, attrs) {\n        const lbl = document.createElement('label');\n        lbl.className = 'tw-row';\n        const ks = document.createElement('span'); ks.className = 'tw-k'; ks.textContent = label;\n        const inp = document.createElement('input');\n        inp.type = type;\n        inp.dataset.tweak = k;\n        if (attrs) Object.keys(attrs).forEach(a => inp.setAttribute(a, attrs[a]));\n        const v = document.createElement('span'); v.className = 'tw-v'; v.dataset.tweakV = k;\n        lbl.appendChild(ks); lbl.appendChild(inp); lbl.appendChild(v);\n        return lbl;\n      }\n      function section(title) {\n        const s = document.createElement('div');\n        s.className = 'tw-section';\n        s.textContent = title;\n        return s;\n      }\n\n      CIRCLES.forEach(c => {\n        body.appendChild(section(c.label));\n        body.appendChild(row('Horizontal', c.keys[0], 'range', { min: 0, max: 100, step: 0.5 }));\n        body.appendChild(row('Vertical',   c.keys[1], 'range', { min: 0, max: 100, step: 0.5 }));\n        body.appendChild(row('Size',       c.keys[2], 'range', { min: 6, max: 40, step: 0.5 }));\n      });\n      body.appendChild(section('Stroke (all circles)'));\n      body.appendChild(row('Color', 'circleColor',  'color'));\n      body.appendChild(row('Width', 'circleStroke', 'range', { min: 1, max: 8, step: 0.1 }));\n\n      const inputs = panel.querySelectorAll('[data-tweak]');\n      const labels = panel.querySelectorAll('[data-tweak-v]');\n\n      function fmt(k, v) {\n        if (k === 'circleColor')  return v;\n        if (k === 'circleStroke') return Number(v).toFixed(1) + 'px';\n        return Math.round(v * 10) / 10 + '%';\n      }\n\n      function apply() {\n        CIRCLES.forEach(c => {\n          const el = slotEls[c.id];\n          if (!el) return;\n          const [xK, yK, sK] = c.keys;\n          el.svg.style.left   = tweaks[xK] + '%';\n          el.svg.style.top    = tweaks[yK] + '%';\n          el.svg.style.width  = tweaks[sK] + '%';\n          el.svg.style.height = tweaks[sK] + '%';\n          el.path.style.stroke      = tweaks.circleColor;\n          el.path.style.strokeWidth = tweaks.circleStroke + 'px';\n        });\n        labels.forEach(l => {\n          const k = l.dataset.tweakV;\n          l.textContent = fmt(k, tweaks[k]);\n        });\n      }\n\n      inputs.forEach(inp => {\n        const k = inp.dataset.tweak;\n        inp.value = tweaks[k];\n        inp.addEventListener('input', () => {\n          const v = inp.type === 'color' ? inp.value : Number(inp.value);\n          tweaks[k] = v;\n          apply();\n          window.parent.postMessage(\n            { type: '__edit_mode_set_keys', edits: { [k]: v } },\n            '*'\n          );\n        });\n      });\n\n      apply();\n\n      // Edit-mode protocol\n      window.addEventListener('message', (e) => {\n        const d = e && e.data;\n        if (!d || !d.type) return;\n        if (d.type === '__activate_edit_mode')   panel.hidden = false;\n        if (d.type === '__deactivate_edit_mode') panel.hidden = true;\n      });\n      closeB.addEventListener('click', () => {\n        panel.hidden = true;\n        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');\n      });\n      window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n    })();\n  <\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
